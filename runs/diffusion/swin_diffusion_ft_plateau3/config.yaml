data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8

generative:
  framework: diffusion
  diffusion:
    schedule:     sigmoid
    timesteps:    1000
    cfg_prob:     0.2
    prediction:   epsilon
    x0_clamp:     5.0
  sampler:
    method: ddim
    steps: 50
    eta: 0.0
    cfg_scale: 1.3
    viz:
      sampler_a: ddpm
      sampler_b: ddim

training:
  batch_size: 64
  num_workers: 15
  max_epochs: 300
  lr: 7.5e-6
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 0
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 2
  plateau_factor: 0.5
  early_stop_patience: 25

checkpoint:
  ckpt_dir: runs/swin_diffusion_ft_plateau3/
  ckpt_name: best.pt
