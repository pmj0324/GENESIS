##############################################################################
# swin_flow_robust_iqr_ft_plateau.yaml
# Fine-tuning from runs/flow/swin/swin_flow_robust_iqr on the same robust_iqr data
#
# Usage:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_robust_iqr_ft_plateau.yaml \
#     --finetune runs/flow/swin/swin_flow_robust_iqr/best.pt
#
# 목적:
#   - robust_iqr 완주본 가중치를 이어받기
#   - 데이터는 그대로 robust_iqr 유지
#   - 새 run 디렉토리에서 plateau 스케줄로 미세조정
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/robust_iqr
  norm_config: configs/normalization/robust_iqr.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: heun
    steps: 25
    cfg_scale: 1.15
    viz:
      sampler_a: euler
      sampler_b: heun

training:
  batch_size: 64
  num_workers: 4
  max_epochs: 120

  lr: 5.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0

  schedule: plateau
  plateau_patience: 4
  plateau_factor: 0.6
  eta_min: 1.0e-7

  warmup_epochs: 0
  early_stop_patience: 40

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_robust_iqr_ft_plateau/
  ckpt_name: best.pt
