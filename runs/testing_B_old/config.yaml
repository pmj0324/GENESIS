data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.0
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.0
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true
training:
  batch_size: 64
  num_workers: 20
  max_epochs: 300
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine
  T_max: 200
  eta_min: 1.0e-6
  early_stop_patience: 25

checkpoint:
  ckpt_dir: runs/testing_B_old/
  ckpt_name: best.pt
