##############################################################################
# swin_flow_testing_B_old_ft_plateau_to_cosine_restarts.yaml
#
# 목적:
#   - runs/testing_B_old_ft_plateau/best.pt 에서 가중치만 이어받아 추가 학습
#   - 데이터/모델/샘플러 설정은 그대로 유지
#   - plateau 이후 낮은 LR의 cosine restarts로 한 번 더 fine-tuning
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_testing_B_old_ft_plateau_to_cosine_restarts.yaml \
#     --finetune runs/testing_B_old_ft_plateau/best.pt
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.0
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.01
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  batch_size: 32
  num_workers: 20
  max_epochs: 80
  lr: 2.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 0
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 2
  eta_min: 1.0e-6
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/testing_B_old_ft_plateau_to_cosine_restarts/
  ckpt_name: best.pt
