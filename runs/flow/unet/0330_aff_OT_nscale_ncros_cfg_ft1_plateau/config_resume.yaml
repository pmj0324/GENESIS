##############################################################################
# unet_flow_0330_ft_best_plateau.yaml
#
# 목적:
#   - runs/flow/unet/unet_flow_0330/best.pt 에서 UNet을 추가 학습
#   - optimizer / scheduler는 새로 시작하고, plateau 스케줄로 미세 조정
#   - 원본 run은 보존하고 새 ckpt_dir에 저장
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/unet/unet_flow_0330_ft_best_plateau.yaml \
#     --finetune runs/flow/unet/unet_flow_0330/best.pt
#
# 변경 포인트 vs unet_flow_0330:
#   - 시작점: best.pt
#   - schedule: plateau
#   - lr: 3e-5 -> 1e-5
#   - warmup_epochs: 5 -> 0
#   - max_epochs: 500 -> 180
#   - early_stop_patience: 15 -> 30
#   - ckpt_dir 분리
##############################################################################

data:
  data_dir: /home/work/cosmology/refactor/GENESIS/GENESIS-data/LH_affine_meanmix_legacy.zarr
  data_fraction: 1.0
  augment: true
model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  unet:
    preset: B
    attention_resolution: 32
    circular_conv: true
generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.2
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true
training:
  batch_size: 8
  num_workers: 20
  max_epochs: 180
  lr: 1.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 4
  plateau_factor: 0.75
  eta_min: 1.0e-7
  warmup_epochs: 0
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 15
checkpoint:
  ckpt_dir: runs/flow/unet/0330_aff_OT_nscale_ncros_cfg_ft1_plateau/
  ckpt_name: best.pt
