##############################################################################
# unet_flow_0412_log_p1_p99_m1p1_ft_plateau_lr6p6e6_f06_p3.yaml
#
# 목적:
#   - /home/work/cosmology/GENESIS/runs/flow/unet/0412_unet_flow_log_p1_p99_m1p1_ft_plateau
#     의 last.pt에서 추가 학습
#   - plateau 스케줄러 하이퍼파라미터 재설정:
#       lr=6.6e-6, factor=0.6, plateau_patience=3
#   - early stopping patience=20
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/unet/unet_flow_0412_log_p1_p99_m1p1_ft_plateau_lr6p6e6_f06_p3.yaml \
#     --finetune /home/work/cosmology/GENESIS/runs/flow/unet/0412_unet_flow_log_p1_p99_m1p1_ft_plateau/last.pt
##############################################################################

data:
  data_dir: /home/work/cosmology/refactor/GENESIS/GENESIS-data/LH_p1p99_affine_legacy.zarr
  data_fraction: 1.0
  augment: true

model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.0
  unet:
    preset: B
    attention_resolution: 32
    circular_conv: true

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.05
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.0
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  batch_size: 16
  num_workers: 40
  max_epochs: 80
  lr: 6.6e-6
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 0
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 3
  plateau_factor: 0.6
  plateau_min_lr: 1.0e-7
  ema:
    enabled: true
    decay: 0.9995
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/flow/unet/0412_p99_OT_nscale_ncros_cfg_ft2_plateau/
  ckpt_name: best.pt
