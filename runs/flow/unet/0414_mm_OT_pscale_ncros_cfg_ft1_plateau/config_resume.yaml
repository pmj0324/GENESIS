##############################################################################
# unet_flow_0414_minmaxsym_perscale_only_ft_plateau_lr2e5_f065_p4_es20.yaml
#
# 목적:
#   - 0414_unet_flow_minmaxsym_perscale_only 모델을 추가 fine-tuning
#   - scheduler: plateau (재설정)
#   - lr=2e-5, plateau_factor=0.65, plateau_patience=4, early_stop_patience=20
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/unet/unet_flow_0414_minmaxsym_perscale_only_ft_plateau_lr2e5_f065_p4_es20.yaml \
#     --finetune /home/work/cosmology/GENESIS/runs/flow/unet/0414_unet_flow_minmaxsym_perscale_only/last.pt
##############################################################################

data:
  data_dir: /home/work/cosmology/refactor/GENESIS/GENESIS-data/LH_minmax_sym_astro_mixed.zarr
  data_fraction: 1.0
  augment: true

model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.0
  unet:
    preset: B
    attention_resolution: 64
    circular_conv: true
    upsample_mode: nearest
    cond_context_mode: cond
    cross_attn_cond: false
    per_scale_cond: true
    channel_se: false
    num_heads: 4

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.05
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.0
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  batch_size: 16
  num_workers: 40
  max_epochs: 150
  lr: 2.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 0
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 4
  plateau_factor: 0.65
  min_lr: 3.0e-6
  ema:
    enabled: true
    decay: 0.9995
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/flow/unet/0414_mm_OT_pscale_ncros_cfg_ft1_plateau/
  ckpt_name: best.pt
