##############################################################################
# unet_flow_0330_s.yaml
#
# 목적:
#   - 기존 unet_flow_0330 설정을 기준으로 UNet S preset 실험
#   - 데이터/생성 프레임워크는 최대한 동일하게 두고 모델 크기만 줄여 비교
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/unet/unet_flow_0330_s.yaml
#
# 변경 포인트 vs unet_flow_0330:
#   - preset: B -> S
#   - 작은 모델이라 batch_size를 8 -> 16으로 상향
#   - ckpt_dir 분리
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 1.0
  augment: true
model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  unet:
    preset: S
    attention_resolution: 32
    circular_conv: true
generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.0
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true
training:
  batch_size: 16
  num_workers: 20
  max_epochs: 500
  lr: 3.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 7
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine
  T_max: 7
  eta_min: 3.0e-8
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 18

checkpoint:
  ckpt_dir: runs/flow/unet/unet_flow_0330_s/
  ckpt_name: best.pt
