##############################################################################
# swin_flow_custom.yaml
# Swin Transformer + OT Flow Matching — 완전 커스텀 파라미터
#
# 사용법:
#   python train.py --config configs/experiments/flow/swin/swin_flow_custom.yaml
#   python train.py --config configs/experiments/flow/swin/swin_flow_custom.yaml \
#                   --finetune runs/flow/swin/swin_flow_ft/best.pt   # FT 시작 시
#
# swin_flow (preset=B) 대비 변경점:
#   1. preset 제거 → 파라미터 직접 지정 (아래 설명 참고)
#   2. depths: [2,2,8,2] → [2,4,16,4]  — enc2·bottleneck 강화 (low_k 개선 목적)
#   3. window_size: 8 유지             — bottleneck(8×8 tokens) 안전 최대값
#   4. augment: true                  — D4 회전/flip augmentation (×8 데이터)
#   5. cfg_prob: 0.15                 — CFG 조건 드롭아웃 소폭 증가
#   6. steps: 50                      — 샘플링 품질 향상
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
  data_fraction: 1.0

  # ── D4 Augmentation ────────────────────────────────────────────────────────
  # 우주론 필드는 통계적 등방성 → 회전/flip이 정확한 물리적 대칭
  # train 에만 적용 (val/test는 자동으로 off)
  #
  # 변환 목록 (D4 이면체군, 8가지):
  #   rot0°   / rot90°   / rot180°   / rot270°
  #   hflip   / rot90+hflip / rot180+hflip / rot270+hflip
  #
  # 효과:
  #   - 유효 훈련 샘플: 12,000 → 96,000 (×8)
  #   - P(k) 보존 (등방성 평균이므로 회전 불변)
  #   - 조건 파라미터(Ωm, σ8, …) 보존 (전역 스칼라)
  #   - 보간 오차 없음 (정수 픽셀 변환)
  augment: true


model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05   # 소량 regularization (augment와 병행 시 효과적)

  swin:
    # ── preset 없이 모든 파라미터 직접 지정 ──────────────────────────────────
    # preset 사용 예: preset: B  →  embed_dim=128, depths=[2,2,8,2], heads=[4,8,16,32]
    # 여기서는 preset 미사용 (preset: null 또는 키 자체 생략)

    # embed_dim: 첫 번째 스테이지 채널 수.
    # 각 스테이지 채널: [C, 2C, 4C, 8C] = [128, 256, 512, 1024]
    # B=128, L=192; 여기서는 B와 동일하게 유지 (메모리 고려)
    embed_dim: 128

    # depths: [enc0, enc1, enc2, bottleneck] — 각 스테이지 SwinBlock 수
    #
    # 토큰 해상도:
    #   enc0:       64×64  (patch_size=4, 256→64)
    #   enc1:       32×32  (PatchMerging ×1)
    #   enc2:       16×16  (PatchMerging ×2)
    #   bottleneck:  8×8   (PatchMerging ×3)
    #
    # low_k 개선 전략:
    #   - enc2(16×16) 깊게 → 중간 스케일 구조 학습 강화
    #   - bottleneck(8×8) 깊게 → ws=8일 때 전체 8×8 토큰이 1개 윈도우
    #     → 사실상 global self-attention → 대규모 구조(low_k) 직접 학습
    #
    # 파라미터 수 비교 (embed_dim=128 기준):
    #   [2, 2,  8, 2] → 123M  (preset B)
    #   [2, 4,  8, 2] → 130M
    #   [2, 4, 10, 2] → 149M  ← 선택  enc1·enc2 강화, bottleneck 동일
    #   [2, 2, 12, 2] → 161M
    #   [2, 4, 12, 4] → 199M
    #
    # 선택 근거:
    #   enc1 (32×32 tokens): depth 2→4  — 중간 스케일 mixing 강화
    #   enc2 (16×16 tokens): depth 8→10 — low_k에 가장 민감한 스케일 대폭 강화
    #   bottleneck (8×8):    depth 2    — ws=8 = 전체 토큰 1윈도우 → 이미 global
    depths: [2, 4, 10, 2]

    # num_heads: 각 스테이지 attention head 수.
    # head_dim = stage_dim / num_heads 가 일정하면 이상적.
    # embed_dim=128 기준:
    #   enc0:  128 / 4  = 32  (head_dim=32)
    #   enc1:  256 / 8  = 32  (head_dim=32)
    #   enc2:  512 / 16 = 32  (head_dim=32)
    #   btn:  1024 / 32 = 32  (head_dim=32) ← 전 스테이지 동일
    #
    # [PRESET-B]  num_heads: [4, 8, 16, 32]
    num_heads: [4, 8, 16, 32]

    # window_size: 각 스테이지 attention window 크기 (토큰 단위).
    #
    # 안전 최대값: min(bottleneck_H, bottleneck_W) = 8
    # (8×8 bottleneck에서 ws=8이면 윈도우 1개 = 전체 → global attention)
    # ws=16이면 bottleneck에서 H//ws=0 → 오류 발생
    #
    # [PRESET-B]  window_size: 8
    window_size: 8

    # patch_size: 초기 패치 임베딩 크기.
    # 256×256 → 256/4 = 64×64 토큰 (standard)
    # patch_size=2 → 128×128 토큰 (4× 연산량, ws=16 가능해짐; 현재 미사용)
    patch_size: 4


generative:
  framework: flow_matching
  flow_matching:
    method: ot          # OT (Optimal Transport) flow: 직선 궤적, 빠른 수렴
                        # 대안: stochastic (더 많은 노이즈 → 분포 diversity ↑)
    cfg_prob: 0.15      # 조건부 드롭아웃 확률 (원본 0.1 → 0.15)
                        # CFG 추론 시 guidance 효과 강화
    sigma_min: 1.0e-4   # source 분포의 최소 노이즈 (OT flow 기본값)

  sampler:
    method: heun        # Heun (2차 Runge-Kutta): euler보다 정확, RK4보다 빠름
    steps: 50           # NFE=50; 원본 25 → 50 (분포 정확도 개선)
    cfg_scale: 1.5      # Classifier-Free Guidance 강도
                        # 1.0 = guidance 없음, >1.0 = 조건 강화
                        # 너무 크면 다양성 감소 (>3.0 권장 안 함)
    viz:
      sampler_a: euler  # 시각화용 빠른 sampler (NFE=50 고정)
      sampler_b: heun   # 시각화용 정밀 sampler


training:
  batch_size: 16        # Swin-custom (~130M): 메모리 여유 위해 16
                        # GPU 메모리 여유 있으면 32로 올려도 됨
  num_workers: 4
  max_epochs: 200

  # ── Optimizer ──────────────────────────────────────────────────────────────
  lr: 1.0e-4            # scratch 학습 기본값
                        # finetune 시: 3e-5 권장 (--finetune 플래그 사용)
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0

  # ── LR Schedule: Cosine Annealing Warm Restarts (SGDR) ──────────────────
  # CosineAnnealingWarmRestarts: T_0 epoch마다 lr를 최대값으로 재시작
  #
  # 200 epoch 기준 주기 구조 (T_0=50, T_mult=2):
  #
  #  lr ↑                 ↑                          ↑
  #     |\ Cycle1(50ep)  |\ Cycle2(100ep)           |\ Cycle3(200ep, cut)
  #     | \              |  \                        |
  #     |  \             |    \                      |
  #     |___\____________|______\____________________|____→ epoch
  #     0   50          50    150                  150  200
  #
  # T_mult=2: 다음 주기는 이전의 2배 길이 → 50, 100, 200, ...
  # 짧은 주기에서 빠르게 escape (local minima 탈출),
  # 긴 주기에서 정밀하게 수렴 (fine-grained optimization)
  #
  # 대안:
  #   T_0=50, T_mult=1 → 균등 주기 50ep, 4번 반복
  #   T_0=40, T_mult=2 → 주기: 40, 80, 160 (3번 restart)
  schedule: cosine_restarts
  T_0: 50               # 첫 번째 주기 길이 (epoch)
  T_mult: 2             # 각 재시작 후 주기 길이 배수 (50→100→200→...)
  eta_min: 1.0e-6       # 주기 끝에서의 최소 lr

  warmup_epochs: 5      # 초기 5 epoch 선형 warmup (첫 주기 시작 전)

  early_stop_patience: 60   # 재시작마다 일시적 val_loss 상승 → patience 넉넉하게
                            # (T_0+T_0*T_mult = 50+100 = 150보다 크게 설정 권장)

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_custom/
  ckpt_name: best.pt
