##############################################################################
# swin_flow_l_periodic_concat_nearest_bottleneck_ema.yaml
#
# 목적:
#   - 지금까지 가장 잘 나온 Swin L backbone을 유지
#   - UNet이 강한 이유로 보이는 periodic/local prior를 Swin에도 적극 주입
#   - 다만 "옵션 전부 켜기" 대신, 안정적인 중간 강도 조합으로 시작
#
# 설계 포인트:
#   - 유지:
#       * Swin preset L
#       * cond_fusion=concat (JointEmbedding)
#       * EMA + cosine restarts
#       * linear output head
#   - UNet 쪽 inductive bias를 반영:
#       * periodic_boundary=true
#       * conv2x_periodic stem
#       * nearest_conv expand
#   - 과도한 복잡도는 제한:
#       * cross-attn은 bottleneck에만 사용
#       * stem-skip output head는 비활성
#       * cfg_scale은 과하지 않게 1.15
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_l_periodic_concat_nearest_bottleneck_ema.yaml
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  #dropout: 0.05
  swin:
    preset: S
    patch_size: 4
    window_size: 8

    # Joint conditioning
    cond_fusion: concat

    # Stronger periodic/local prior to close the gap with circular-conv UNet
    periodic_boundary: true
    stem_type: conv2x_periodic
    stem_channels: 32
    expand_type: nearest_conv
    output_head: linear

    # Keep extra conditioning focused and stable
    channel_se: true
    channel_se_reduction: 4
    cross_attn_cond: true
    cross_attn_stages: [bottleneck]
    cond_token_depth: 1

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 50
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.15
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  # L backbone + periodic stem/xattn 조합이라 base L config보다 보수적으로 시작
  batch_size: 16
  num_workers: 20
  max_epochs: 400
  lr: 7.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 10
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 12
  T_mult: 1
  eta_min: 5.0e-7
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 35

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_l_periodic_concat_nearest_bottleneck_ema/
  ckpt_name: best.pt
