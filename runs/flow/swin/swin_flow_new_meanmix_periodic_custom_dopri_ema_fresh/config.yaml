##############################################################################
# swin_flow_meanmix_periodic_custom_dopri_ema_fresh.yaml
#
# 목적:
#   - affine_mean_mix 데이터셋으로 Swin Flow를 scratch부터 학습
#   - Swin을 preset이 아니라 "직접 지정하는(custom)" 파라미터로 사용
#   - shifted window periodic boundary 지원 활성화
#   - 기본 샘플러: dopri5 (adaptive ODE)
#   - EMA + cosine restarts + warmup
#
# 메모:
#   - 이 파일은 "최대 옵션" 실험용입니다.
#   - ChannelSE / deep cross-attn / periodic conv stem / stem-skip output head를 모두 켭니다.
#   - depths/head 재분배도 함께 적용해서 deep stage conditioning과 high-res 복원을 강화합니다.
#   - framework=flow_matching 이므로 sampler에 eta는 사용하지 않습니다.
#   - dopri5 정확도 옵션은 rtol/atol이 핵심이며, 1e-4 정도를 기본 시작점으로 둡니다.
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_meanmix_periodic_custom_dopri_ema_fresh.yaml
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1

  swin:
    # preset은 일부러 생략했습니다.
    # 아래 파라미터를 직접 조절하면 train.py에서 자동으로 "custom" Swin으로 처리됩니다.

    # patch_size=4 -> 256x256 입력이 64x64 token grid로 시작
    # patch_size를 줄이면 토큰 수가 늘어 메모리/연산량이 크게 증가합니다.
    patch_size: 4

    # 첫 stage 채널 수
    # 현재 128은 preset B와 동일
    embed_dim: 128

    # [enc0, enc1, enc2, bottleneck]
    # 제안안 기준으로 균등 재분배
    depths: [4, 4, 4, 4]

    # 각 stage의 head 수
    # stage dim = [128, 256, 512, 1024]
    # [2,4,8,16]이면 전 stage에서 head_dim=64를 유지
    num_heads: [2, 4, 8, 16]

    # local attention window 크기 (token 단위)
    # patch_size=4, window_size=8 이면 입력 이미지 기준 32px window
    # bottleneck은 8x8 token이므로, 여기서 8은 사실상 bottleneck global attention처럼 동작합니다.
    window_size: 8

    # add / concat
    cond_fusion: concat

    # true면 shifted window에서 periodic seam 너머 토큰도 attention 대상이 됩니다.
    periodic_boundary: true

    # Stage output 뒤에 token-space SE rebalancing 추가
    channel_se: true
    channel_se_reduction: 4

    # Deep stage에서 6개 cosmology parameter token으로 cross-attention
    cross_attn_cond: true
    cross_attn_stages: [enc2, bottleneck, dec2]
    cond_token_depth: 2

    # Periodic conv stem + stem skip output head
    stem_type: conv2x_periodic
    stem_channels: 32
    output_head: stem_skip_conv

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4

  sampler:
    method: dopri5
    steps: 50         # adaptive solver라 실질 미사용(인터페이스 호환용)
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.5
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      eval_n: 15

training:
  # 추가 옵션이 모두 켜져 있어 메모리/속도를 고려해 batch를 한 단계 낮춤
  batch_size: 32
  num_workers: 20
  max_epochs: 500
  lr: 2.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 10
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 30

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_new_meanmix_periodic_custom_dopri_ema_fresh/
  ckpt_name: best.pt
