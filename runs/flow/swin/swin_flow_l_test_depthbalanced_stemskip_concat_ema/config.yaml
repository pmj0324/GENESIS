##############################################################################
# swin_flow_l_depthbalanced_stemskip_concat_ema.yaml
#
# 목적:
#   - Swin L-scale 폭을 유지하면서 depth는 더 균형 있게 재분배
#   - UNet이 강한 이유로 보이는 local / periodic prior를 Swin에 더 적극 반영
#   - encoder-decoder skip 외에 stem skip output head도 사용해 고해상도 복원 강화
#
# 설계 포인트:
#   - L-scale custom backbone:
#       * embed_dim=192
#       * depths=[3,3,8,3]
#       * num_heads=[6,12,24,48]
#   - conditioning:
#       * cond_fusion=concat
#       * bottleneck-only cross-attn
#   - local prior:
#       * periodic_boundary=true
#       * conv2x_periodic stem
#       * stem_skip_resize_conv output head
#   - 안정화:
#       * EMA
#       * cosine restarts
#       * 보수적 lr
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_l_depthbalanced_stemskip_concat_ema.yaml
##############################################################################

data:
  data_fraction: 0.25
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  swin:
    patch_size: 4
    embed_dim: 192
    depths: [3, 3, 8, 3]
    num_heads: [6, 12, 24, 48]
    window_size: 8

    cond_fusion: concat

    periodic_boundary: true
#    stem_type: conv2x_periodic
    #stem_channels: 32
    #output_head: stem_skip_resize_conv
    #expand_type: nearest_conv

    channel_se: true
    channel_se_reduction: 4
    cross_attn_cond: true
    cross_attn_stages: [bottleneck]
    cond_token_depth: 1

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 50
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.15
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  # stem skip output head까지 켠 만큼 약간 보수적으로 유지
  batch_size: 16
  num_workers: 20
  max_epochs: 400
  lr: 3.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 10
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 12
  T_mult: 1
  eta_min: 5.0e-7
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 35

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_l_test_depthbalanced_stemskip_concat_ema/
  ckpt_name: best.pt
