##############################################################################
# swin_flow_meanmix_rk4_smallstart_ft_plateau_dopri_fresh.yaml
#
# 목적:
#   - runs/flow/swin/swin_flow_meanmix_rk4_smallstart/best.pt에서 fine-tuning
#   - 기본 샘플러: dopri5 (adaptive)
#   - 보조 샘플러(viz 비교): rk4
#   - 기존 run을 resume하지 않고, 새 폴더에서 fresh FT 시작
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_meanmix_rk4_smallstart_ft_plateau_dopri_fresh.yaml \
#     --finetune runs/flow/swin/swin_flow_meanmix_rk4_smallstart/best.pt
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 50         # dopri5에서는 adaptive라 실질 미사용(인터페이스 호환용)
    rtol: 1.0e-5
    atol: 1.0e-5
    cfg_scale: 1.05
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      eval_n: 15

training:
  batch_size: 128
  num_workers: 4
  max_epochs: 200
  lr: 1.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 0
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 5
  plateau_factor: 0.5
  early_stop_patience: 45

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_meanmix_rk4_smallstart_ft_plateau_dopri_fresh/
  ckpt_name: best.pt
