##############################################################################
# swin_flow_custom_l_cosine.yaml
# Swin Transformer L + OT Flow Matching
#
# Usage:
#   python GENESIS/train.py --config GENESIS/configs/experiments/flow/swin/swin_flow_custom_l_cosine.yaml
#
# Requested changes:
#   - Larger Swin model: preset L
#   - Cosine warm restarts with warmup
#   - Restart period T_0 = 10, T_mult = 1
#   - Early stopping patience = 20
#
# NOTE:
#   Swin은 cond_fusion으로 결합 방식을 선택할 수 있음:
#       cond_fusion: add     -> emb = t_embed(t) + c_embed(cond)
#       cond_fusion: concat  -> emb = JointEmbedding(t_embed, c_embed)
##############################################################################

data:
  data_dir:  /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 1.0
  augment: true


model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  swin:
    preset: L
    patch_size: 4
    window_size: 8


generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.01
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true
training:
  batch_size: 32
  num_workers: 20
  max_epochs: 800
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 7
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 15
  T_mult: 2
  eta_min: 1.0e-7
  early_stop_patience: 50

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_custom_l_cosine_0329/
  ckpt_name: best.pt
