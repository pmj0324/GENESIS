##############################################################################
# swin_flow_meanmix_periodic_balanced_ema.yaml
#
# 목적:
#   - affine_mean_mix 데이터셋용 Swin Flow "중상 강도" 설정
#   - 예전 dopri5 sampler 흐름은 유지하면서, 채널 규모와 conditioning 옵션을 B보다 한 단계 확장
#   - all-on custom 실험처럼 과격하지 않되, balanced 버전보다 표현력을 조금 더 키우는 방향
#
# 설계 포인트:
#   - 유지:
#       * periodic boundary attention
#       * cond_fusion=concat
#       * EMA + cosine restarts
#       * periodic conv stem + linear output head
#   - 확장:
#       * preset B(128ch) 대신 custom 144ch
#       * token-space ChannelSE
#       * bottleneck-only cross-attention
#   - 의도적으로 제외:
#       * depths/head 재분배 custom 구조
#       * deep cross-attn (enc2 / bottleneck / dec2)
#       * stem-skip conv output head
#       * 높은 CFG(1.5)
#
# 메모:
#   - sampler는 예전처럼 dopri5로 되돌리되, cfg_scale은 과하지 않게 유지합니다.
#   - output head는 linear를 유지해 high-k 과증폭 가능성을 줄입니다.
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_meanmix_periodic_balanced_ema.yaml
##############################################################################

data:
  data_fraction: 0.3
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    embed_dim: 128
    depths: [2, 2, 4, 2]
    num_heads: [4, 8, 16, 32]
    window_size: 8
    cond_fusion: concat
    periodic_boundary: true

    # 출력 경로는 보수적으로 두고, 입력 쪽 periodic prior만 적극 사용합니다.
    # stem_type: conv2x_periodic
    # stem_channels: 32
    # output_head: linear

    # B보다 살짝 공격적으로: SE + bottleneck cross-attn만 사용합니다.
    # channel_se: true
    # channel_se_reduction: 4
    # cross_attn_cond: true
    # cross_attn_stages: [bottleneck]
    # cond_token_depth: 1

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 50
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.15
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      eval_n: 15
training:
  batch_size: 64
  num_workers: 20
  max_epochs: 280
  lr: 1.5e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 7
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  # ema:
  #   enabled: true
  #   decay: 0.9999
  #   update_every: 1
  #   update_after_step: auto
  #   min_update_after_step: 500
  #   eval_with_ema: true
  early_stop_patience: 25

checkpoint:
  ckpt_dir: runs/testing
  ckpt_name: best.pt
