##############################################################################
# swin_flow_custom_l_cosine_ft_plateau.yaml
# Fine-tuning from runs/swin_flow_custom_l_cosine on the same affine_default data
#
# Usage:
#   python train.py \
#     --config configs/experiments/swin_flow_custom_l_cosine_ft_plateau.yaml \
#     --finetune runs/swin_flow_custom_l_cosine/best.pt
#
# 목적:
#   - 기존 swin_flow_custom_l_cosine 가중치를 이어받기
#   - 데이터는 그대로 affine_default 유지
#   - 새 run 디렉토리에서 plateau 스케줄로 다시 학습
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
  data_fraction: 1.0
  augment: true


model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05

  swin:
    preset: L
    patch_size: 4
    window_size: 8


generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.15
    sigma_min: 1.0e-4

  sampler:
    method: heun
    steps: 50
    cfg_scale: 1.3
    viz:
      sampler_a: euler
      sampler_b: heun


training:
  batch_size: 64
  num_workers: 4
  max_epochs: 120

  lr: 3.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0

  schedule: plateau
  plateau_patience: 4
  plateau_factor: 0.6
  eta_min: 1.0e-7

  warmup_epochs: 0
  early_stop_patience: 40


checkpoint:
  ckpt_dir: runs/swin_flow_custom_l_cosine_ft_plateau/
  ckpt_name: best.pt
