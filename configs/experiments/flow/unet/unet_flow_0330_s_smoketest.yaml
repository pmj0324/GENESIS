data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 0.2
  augment: true

model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  unet:
    preset: S
    attention_resolution: 32
    circular_conv: true

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: euler
    steps: 12
    cfg_scale: 1.0
    viz:
      sampler_a: euler
      sampler_b: euler
      samplers: [euler]
      metrics_sampler: euler
      eval_n: 4
      every_epoch: false

training:
  batch_size: 16
  num_workers: 12
  max_epochs: 3
  lr: 3.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 1
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine
  T_max: 3
  eta_min: 3.0e-8
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 200
    eval_with_ema: true
  early_stop_patience: 3

checkpoint:
  ckpt_dir: runs/flow/unet/unet_flow_0330_s_smoketest/
  ckpt_name: best.pt
