##############################################################################
# unet_flow_0330_ft_last_cosine_restarts_t0_3.yaml
#
# 목적:
#   - runs/flow/unet/unet_flow_0330/last.pt 의 최신 가중치에서 이어서 추가 학습
#   - 단, optimizer / scheduler는 새로 시작해서 warmup + cosine restarts를 실제로 적용
#   - data augmentation을 켜고, 새 run 디렉토리에 저장
#   - local minimum 탈출을 위해 중간 강도의 LR + 짧은 cosine restart 사용
#
# 왜 --resume이 아니라 --finetune(last.pt)인가?
#   - 현재 trainer는 --resume 시 optimizer/scheduler state를 그대로 복원함
#   - 그래서 새 cosine_restarts 설정이 원하는 방식으로 다시 시작되지 않음
#   - last.pt를 --finetune으로 읽으면 "마지막 모델 상태에서 시작"하면서 스케줄은 새로 줄 수 있음
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/unet/unet_flow_0330_ft_last_cosine_restarts_t0_3.yaml \
#     --finetune runs/flow/unet/unet_flow_0330/last.pt
#
# 스케줄 메모:
#   - base lr = 3e-5
#   - eta_min = 1e-6  -> cosine cycle의 바닥값 목표
#   - T_0 = 3, T_mult = 1 -> 3 epoch마다 restart
#   - warmup은 0으로 두어 restart cycle을 그대로 활용
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 1.0
  augment: true

model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  unet:
    preset: B
    attention_resolution: 32
    circular_conv: true

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.2
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  batch_size: 8
  num_workers: 20
  max_epochs: 120

  lr: 3.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  grad_clip: 1.0
  optimizer: adamw

  schedule: cosine_restarts
  T_0: 3
  T_mult: 1
  eta_min: 1.0e-6

  warmup_epochs: 0

  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true

  early_stop_patience: 24

checkpoint:
  ckpt_dir: runs/flow/unet/unet_flow_0330_ft_last_cosine_restarts_t0_3/
  ckpt_name: best.pt
