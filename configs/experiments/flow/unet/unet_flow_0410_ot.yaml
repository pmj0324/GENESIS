# OT 전용 분리 실험 설정 (0410)
# base: unet_flow_0330.yaml
data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 1.0
  augment: true  # train split에 D4 대칭(회전/반사) augmentation 적용
model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  unet:
    preset: B
    attention_resolution: 32
    circular_conv: true
generative:
  framework: flow_matching
  flow_matching:
    method: c2ot
    cfg_prob: 0.0
    sigma_min: 1.0e-4
    c2ot:
      n_per_theta: 15
      eps: 0.1
      n_iter: 50
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.0
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true
training:
  batch_size: 16
  num_workers: 30
  max_epochs: 500
  lr: 2.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine
  T_max: 5
  eta_min: 5.0e-7
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 20
checkpoint:
  ckpt_dir: runs/flow/unet/unet_flow_0410_ot/
  ckpt_name: best.pt
