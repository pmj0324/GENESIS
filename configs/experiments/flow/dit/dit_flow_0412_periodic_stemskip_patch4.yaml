data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/log_p1_p99_m1p1_channelwise
  data_fraction: 1.0
  augment: true  # train split에 D4 대칭(회전/반사) augmentation 적용

model:
  architecture: dit
  in_channels: 3
  cond_dim: 6
  dropout: 0.0
  dit:
    preset: B
    img_size: 256
    patch_size: 4  # 4x4 patch
    hidden_size: 768
    depth: 12
    num_heads: 4
    mlp_ratio: 4.0
    cond_fusion: concat  # add / concat
    cond_depth: 4

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.05
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.0
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true

training:
  batch_size: 32
  num_workers: 40
  max_epochs: 150
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine
  T_max: 5
  eta_min: 3.0e-6
  ema:
    enabled: true
    decay: 0.9995
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/flow/dit/0412_dit_flow_periodic_stemskip_log_p1_p99_m1p1_patch4/
  ckpt_name: best.pt
