##############################################################################
# swin_flow_meanmix_rk4_smallstart.yaml
#
# 목적:
#   - 새 데이터셋(affine_mean_mix_m130_m125_m100_om10split)으로 Swin Flow 학습
#   - RK4 샘플러 사용
#   - 초반 학습률을 충분히 작게 시작(안정성 우선)
#   - cosine restarts + warmup + early stopping(30)
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_meanmix_rk4_smallstart.yaml
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: rk4
    steps: 15
    cfg_scale: 1.10
    viz:
      sampler_a: euler
      sampler_b: rk4
      eval_n: 15

training:
  batch_size: 32
  num_workers: 4
  max_epochs: 300
  lr: 2.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  early_stop_patience: 30

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_meanmix_rk4_smallstart/
  ckpt_name: best.pt
