##############################################################################
# swin_flow_scale_m150_m140_m110_custom_xattn_stemskip_resizeconv_e128.yaml
#
# 목적:
#   - resize-conv output head를 유지하면서 embed_dim을 128로 복원
#   - 새 정규화 데이터셋 affine_scale_m150_m140_m110 으로 Swin Flow 학습
#   - periodic boundary + deep cross-attn + stem skip output 을 유지
#
# 모델 설계 포인트:
#   - embed_dim=128
#   - depths=[2,2,4,4]
#   - num_heads=[4,8,16,32]
#   - output head는 stem_skip_resize_conv
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_scale_m150_m140_m110_custom_xattn_stemskip_resizeconv_e128.yaml
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_scale_m150_m140_m110
  norm_config: configs/normalization/affine_scale_m150_m140_m110.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.0

  swin:
    patch_size: 4
    embed_dim: 128
    depths: [2, 2, 4, 4]
    num_heads: [4, 8, 16, 32]
    window_size: 8

    cond_fusion: add
    cross_attn_cond: true
    cross_attn_stages: [enc2, bottleneck, dec2]
    cond_token_depth: 2

    periodic_boundary: true
    channel_se: false
    channel_se_reduction: 4

    stem_type: conv2x_periodic
    stem_channels: 32
    output_head: stem_skip_resize_conv

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4

  sampler:
    method: dopri5
    steps: 50
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.15
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15

training:
  batch_size: 64
  num_workers: 20
  max_epochs: 280
  lr: 1.5e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 7
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  # ema:
  #   enabled: true
  #   decay: 0.9999
  #   update_every: 1
  #   update_after_epoch: 27
  #   eval_with_ema: true
  early_stop_patience: 25

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_scale_m150_m140_m110_custom_xattn_stemskip_resizeconv_e128/
  ckpt_name: best.pt
