##############################################################################
# swin_flow_custom_l_cosine_0329_ft_cosine_ema.yaml
#
# 목적:
#   - runs/flow/swin/swin_flow_custom_l_cosine_0329/best.pt 에서 가중치만 이어받아 추가 학습
#   - 기존 0329 실험의 데이터/모델/샘플러 설정은 유지
#   - 낮은 LR의 cosine warm restarts로 미세 조정
#   - EMA on
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_custom_l_cosine_0329_ft_cosine_ema.yaml \
#     --finetune runs/flow/swin/swin_flow_custom_l_cosine_0329/best.pt
#
# 참고:
#   - 가장 최근 상태에서 시작하고 싶으면 best.pt 대신 last.pt를 넣으면 된다.
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 1.0
  augment: true


model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  swin:
    preset: L
    patch_size: 4
    window_size: 8


generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 25
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.01
    viz:
      sampler_a: dopri5
      sampler_b: dopri5
      samplers: [euler, heun, rk4, dopri5]
      metrics_sampler: dopri5
      eval_n: 15
      every_epoch: true


training:
  batch_size: 32
  num_workers: 20
  max_epochs: 80

  lr: 3.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 3
  grad_clip: 1.0
  optimizer: adamw

  schedule: cosine_restarts
  T_0: 15
  T_mult: 1
  eta_min: 1.0e-7

  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true

  early_stop_patience: 25


checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_custom_l_cosine_0329_ft_cosine_ema/
  ckpt_name: best.pt
