##############################################################################
# swin_flow_meanmix_periodic_custom_dopri_ema_fresh.yaml
#
# 목적:
#   - runs/flow/swin/swin_flow_meanmix_rk4_smallstart/best.pt에서 fine-tuning
#   - Swin을 preset이 아니라 "직접 지정하는(custom)" 파라미터로 사용
#   - shifted window periodic boundary 지원 활성화
#   - 기본 샘플러: dopri5 (adaptive ODE)
#   - EMA + plateau + fresh run
#
# 메모:
#   - 아래 값들은 현재 preset B와 동일한 초기값으로 채워져 있습니다.
#   - 즉, 지금 상태로는 동작은 거의 같고, 여기서 숫자만 바꾸면 바로 custom 실험이 됩니다.
#   - framework=flow_matching 이므로 eta는 사용하지 않습니다.
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_meanmix_periodic_custom_dopri_ema_fresh.yaml \
#     --finetune runs/flow/swin/swin_flow_meanmix_rk4_smallstart/best.pt
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1

  swin:
    # preset은 일부러 생략했습니다.
    # 아래 파라미터를 직접 조절하면 train.py에서 자동으로 "custom" Swin으로 처리됩니다.

    # patch_size=4 -> 256x256 입력이 64x64 token grid로 시작
    # patch_size를 줄이면 토큰 수가 늘어 메모리/연산량이 크게 증가합니다.
    patch_size: 4

    # 첫 stage 채널 수
    # 현재 128은 preset B와 동일
    embed_dim: 128

    # [enc0, enc1, enc2, bottleneck]
    # 현재 [2,2,8,2]는 preset B와 동일
    depths: [2, 2, 8, 2]

    # 각 stage의 head 수
    # stage dim = [C, 2C, 4C, 8C] 이고, 각 stage dim이 head 수로 나누어떨어져야 합니다.
    # 현재 [4,8,16,32]는 preset B와 동일
    num_heads: [4, 8, 16, 32]

    # local attention window 크기 (token 단위)
    # patch_size=4, window_size=8 이면 입력 이미지 기준 32px window
    # bottleneck은 8x8 token이므로, 여기서 8은 사실상 bottleneck global attention처럼 동작합니다.
    window_size: 8

    # add / concat
    cond_fusion: concat

    # true면 shifted window에서 periodic seam 너머 토큰도 attention 대상이 됩니다.
    periodic_boundary: true

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4

  sampler:
    method: dopri5
    steps: 50         # adaptive solver라 실질 미사용(인터페이스 호환용)
    rtol: 1.0e-5
    atol: 1.0e-5
    cfg_scale: 1.05
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      eval_n: 15

training:
  # embed_dim/depths를 키우면 batch_size를 먼저 줄이는 게 안전합니다.
  batch_size: 128
  num_workers: 4
  max_epochs: 200
  lr: 1.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 0
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 5
  plateau_factor: 0.5
  eta_min: 1.0e-6
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 45

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_meanmix_periodic_custom_dopri_ema_fresh/
  ckpt_name: best.pt
