##############################################################################
# swin_flow_hybrid_softclip_affine.yaml
# Swin Transformer + OT Flow Matching with Option 2 (Softclip+Affine)
#
# 정규화:
#   - Mcdm: Softclip (극단값 압축)
#   - Mgas: Affine (기본값)
#   - T: Affine (기본값)
#
# 사용법:
#   python train.py --config configs/experiments/flow/swin/swin_flow_hybrid_softclip_affine.yaml
#
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/hybrid_softclip_affine
  norm_config: configs/normalization/hybrid_softclip_affine.yaml
  augment: true
model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: heun
    steps: 25
    cfg_scale: 1.0
    viz:
      sampler_a: euler
      sampler_b: heun
      samples:
        field_space: log
      power:
        field_space: log
        extra_field_spaces: [linear]
        extra_every_n_epochs: 10
      metrics:
        field_space: log

training:
  batch_size: 64
  num_workers: 4
  max_epochs: 200
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  early_stop_patience: 30

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_hybrid_softclip_affine/
  ckpt_name: best.pt
