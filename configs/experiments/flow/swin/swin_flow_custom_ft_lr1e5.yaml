##############################################################################
# swin_flow_custom_ft_lr1e5.yaml
# Fine-tuning from runs/flow/swin/swin_flow_custom/best.pt with a very conservative LR.
#
# Usage:
#   python train.py --config configs/experiments/flow/swin/swin_flow_custom_ft_lr1e5.yaml \
#                   --finetune runs/flow/swin/swin_flow_custom/best.pt
#
# 목적:
#   - 현재 best checkpoint를 거의 보존한 채
#   - PDF 분포를 소폭 보정
#   - 구조적 성능 저하 위험 최소화
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
  data_fraction: 1.0
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05

  swin:
    embed_dim: 128
    depths: [2, 4, 10, 2]
    num_heads: [4, 8, 16, 32]
    window_size: 8
    patch_size: 4

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.15
    sigma_min: 1.0e-4

  sampler:
    method: heun
    steps: 50
    cfg_scale: 1.5
    viz:
      sampler_a: euler
      sampler_b: heun

training:
  batch_size: 16
  num_workers: 4
  max_epochs: 40

  lr: 1.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0

  schedule: plateau
  plateau_patience: 4
  plateau_factor: 0.6
  eta_min: 1.0e-7

  warmup_epochs: 0
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_custom_ft_lr1e5/
  ckpt_name: best.pt
