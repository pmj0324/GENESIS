##############################################################################
# swin_flow_mean_B.yaml
#
# 목적:
#   - affine_mean_mix 데이터셋용 Swin Flow "단순 B preset" 설정
#   - 복잡한 custom block 추가 없이, 비교적 해석하기 쉬운 기준선 모델로 사용
#   - dopri5 sampler + EMA + cosine restarts 조합은 그대로 유지
#
# 설계 포인트:
#   - 유지:
#       * preset B backbone
#       * cond_fusion=concat
#       * periodic boundary attention
#       * linear output head(기본값)
#       * light ChannelSE
#   - 제외:
#       * 수동 embed/depth/head override
#       * cross-attention conditioning
#       * periodic conv stem
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_mean_B.yaml
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8
    cond_fusion: concat
    periodic_boundary: true
    channel_se: true
    channel_se_reduction: 4
generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 50
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.15
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      eval_n: 15
training:
  batch_size: 64
  num_workers: 20
  max_epochs: 280
  lr: 3.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 7
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 15
  T_mult: 1
  eta_min: 1.0e-6
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 25

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_mean_B_test/
  ckpt_name: best.pt
