##############################################################################
# swin_flow_meanmix_periodic_dopri_ema_fresh.yaml
#
# 목적:
#   - affine_mean_mix 데이터셋으로 Swin Flow를 scratch부터 학습
#   - Swin shifted window에 periodic boundary 지원 활성화
#   - 기본 샘플러: dopri5 (adaptive ODE)
#   - 보조 샘플러(viz 비교): rk4
#   - EMA + cosine restarts + warmup
#
# 메모:
#   - 이 설정은 framework=flow_matching 이므로 sampler에 eta를 쓰지 않습니다.
#   - eta는 현재 코드베이스에서 diffusion(ddim) / edm 쪽 샘플러 옵션입니다.
#   - dopri5는 rtol/atol이 너무 타이트하면 실용적으로 지나치게 느려질 수 있어 1e-4부터 시작합니다.
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_meanmix_periodic_dopri_ema_fresh.yaml
##############################################################################

data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100_om10split
  norm_config: configs/normalization/affine_mean_mix_m130_m125_m100.yaml
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  swin:
    preset: B
    window_size: 8
    cond_fusion: concat
    periodic_boundary: true

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: dopri5
    steps: 50         # dopri5에서는 adaptive라 실질 미사용(인터페이스 호환용)
    rtol: 1.0e-4
    atol: 1.0e-4
    cfg_scale: 1.5
    viz:
      sampler_a: dopri5
      sampler_b: rk4
      eval_n: 15

training:
  batch_size: 64
  num_workers: 4
  max_epochs: 300
  lr: 2.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto      # max(min_update_after_step, warmup_epochs * batches_per_epoch)
    min_update_after_step: 500
    eval_with_ema: true
  early_stop_patience: 30

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_meanmix_periodic_dopri_ema_fresh/
  ckpt_name: best.pt
