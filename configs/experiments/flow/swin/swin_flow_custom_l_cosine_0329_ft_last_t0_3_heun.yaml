##############################################################################
# swin_flow_custom_l_cosine_0329_ft_last_t0_3_heun.yaml
#
# 목적:
#   - runs/flow/swin/swin_flow_custom_l_cosine_0329/last.pt 의 최신 가중치에서 추가 학습
#   - optimizer / scheduler는 새로 시작해서 짧은 cosine restarts로 재탐색
#   - sampler는 빠른 heun 하나로 통일
#
# 왜 --resume이 아니라 --finetune(last.pt)인가?
#   - 현재 trainer는 --resume 시 optimizer/scheduler state를 그대로 복원함
#   - 이번 설정은 "마지막 모델 상태"에서 "새 LR schedule"로 다시 시작하는 의도라
#     last.pt를 --finetune으로 읽는 편이 맞음
#
# 사용:
#   python train.py \
#     --config configs/experiments/flow/swin/swin_flow_custom_l_cosine_0329_ft_last_t0_3_heun.yaml \
#     --finetune runs/flow/swin/swin_flow_custom_l_cosine_0329/last.pt
#
# 스케줄 메모:
#   - base lr = 3e-5
#   - eta_min = 1e-6
#   - T_0 = 3, T_mult = 1 -> 3 epoch마다 restart
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_mean_mix_m130_m125_m100
  data_fraction: 1.0
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05
  swin:
    preset: L
    patch_size: 4
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: heun
    steps: 25
    cfg_scale: 1.01
    viz:
      sampler_a: heun
      sampler_b: heun
      metrics_sampler: heun
      eval_n: 15
      every_epoch: true

training:
  batch_size: 32
  num_workers: 20
  max_epochs: 120

  lr: 3.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  grad_clip: 1.0
  optimizer: adamw

  schedule: cosine_restarts
  T_0: 3
  T_mult: 1
  eta_min: 1.0e-6

  warmup_epochs: 0

  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
    update_after_step: auto
    min_update_after_step: 500
    eval_with_ema: true

  early_stop_patience: 24

checkpoint:
  ckpt_dir: runs/flow/swin/swin_flow_custom_l_cosine_0329_ft_last_t0_3_heun/
  ckpt_name: best.pt
