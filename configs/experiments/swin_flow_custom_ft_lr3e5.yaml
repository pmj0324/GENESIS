##############################################################################
# swin_flow_custom_ft_lr3e5.yaml
# Fine-tuning from runs/swin_flow_custom/best.pt with a cautious LR.
#
# Usage:
#   python train.py --config configs/experiments/swin_flow_custom_ft_lr3e5.yaml \
#                   --finetune runs/swin_flow_custom/best.pt
#
# 목적:
#   - power / correlation은 유지
#   - Mgas / T PDF만 미세 조정
#   - cosine restart 대신 plateau로 안정적으로 수렴
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
  data_fraction: 1.0
  augment: true

model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05

  swin:
    embed_dim: 128
    depths: [2, 4, 10, 2]
    num_heads: [4, 8, 16, 32]
    window_size: 8
    patch_size: 4

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.15
    sigma_min: 1.0e-4

  sampler:
    method: heun
    steps: 50
    cfg_scale: 1.5
    viz:
      sampler_a: euler
      sampler_b: heun

training:
  batch_size: 16
  num_workers: 4
  max_epochs: 40

  lr: 3.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0

  schedule: plateau
  plateau_patience: 4
  plateau_factor: 0.6
  eta_min: 1.0e-7

  warmup_epochs: 0
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/swin_flow_custom_ft_lr3e5/
  ckpt_name: best.pt
