##############################################################################
# swin_flow_custom_l_cosine.yaml
# Swin Transformer L + OT Flow Matching
#
# Usage:
#   python GENESIS/train.py --config GENESIS/configs/experiments/swin_flow_custom_l_cosine.yaml
#
# Requested changes:
#   - Larger Swin model: preset L
#   - Cosine warm restarts with warmup
#   - Restart period T_0 = 10, T_mult = 1
#   - Early stopping patience = 20
#
# NOTE:
#   Current Swin implementation does not expose a YAML-only "cond concat"
#   switch. Swin still uses the built-in additive conditioning:
#       emb = t_embed(t) + c_embed(cond)
#   If you want true concatenative conditioning for Swin, we need a small
#   code patch in GENESIS/models/swin.py.
##############################################################################

data:
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
  data_fraction: 1.0
  augment: true


model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.05

  swin:
    preset: L
    patch_size: 4
    window_size: 8


generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.15
    sigma_min: 1.0e-4

  sampler:
    method: heun
    steps: 50
    cfg_scale: 1.5
    viz:
      sampler_a: euler
      sampler_b: heun


training:
  batch_size: 8
  num_workers: 4
  max_epochs: 200

  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0

  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6

  warmup_epochs: 5
  early_stop_patience: 20


checkpoint:
  ckpt_dir: runs/swin_flow_custom_l_cosine/
  ckpt_name: best.pt
