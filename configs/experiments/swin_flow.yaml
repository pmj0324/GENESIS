data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
model:
  architecture: swin
  in_channels: 3
  cond_dim: 6
  dropout: 0.0
  swin:
    preset: B
    window_size: 8

generative:
  framework: flow_matching
  flow_matching:
    method: ot
    cfg_prob: 0.1
    sigma_min: 1.0e-4
  sampler:
    method: heun
    steps: 25
    cfg_scale: 1.0
    viz:
      sampler_a: euler
      sampler_b: heun

training:
  batch_size: 16          # Swin은 메모리 더 사용
  num_workers: 4
  max_epochs: 200
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: cosine
  T_max: 200
  eta_min: 1.0e-6
  early_stop_patience: 20

checkpoint:
  ckpt_dir: checkpoints/swin_flow/
  ckpt_name: best.pt
