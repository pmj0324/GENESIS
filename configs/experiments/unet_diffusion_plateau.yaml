data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default

model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  unet:
    preset: B
    attention_resolution: 32
    channel_se: true
    circular_conv: false

generative:
  framework: diffusion
  diffusion:
    schedule: cosine
    timesteps: 1000
    cfg_prob: 0.1
    prediction: epsilon
    x0_clamp: 5.0
  sampler:
    method: ddim
    steps: 50
    eta: 0.0
    cfg_scale: 1.0
    viz:
      sampler_a: ddpm
      sampler_b: ddim

training:
  batch_size: 8
  num_workers: 4
  max_epochs: 300
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  optimizer: adamw
  grad_clip: 1.0
  # LR schedule
  schedule: plateau
  plateau_patience: 3
  plateau_factor: 0.5
  eta_min: 1.0e-6            # plateau 최소 lr
  warmup_epochs: 5
  # Early stop
  early_stop_patience: 30

checkpoint:
  ckpt_dir: runs/unet_diffusion_plateau/
  ckpt_name: best.pt
