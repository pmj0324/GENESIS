data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default
model:
  architecture: dit
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  dit:
    preset: B
    patch_size: 8

generative:
  framework: diffusion
  diffusion:
    schedule:     sigmoid
    timesteps:    1000
    cfg_prob:     0.2
    prediction: epsilon    # epsilon 또는 x0
    x0_clamp: 5.0          # 샘플링 중 x0 클램핑 범위 (null이면 비활성화)
  sampler:
    method: ddim
    steps: 50
    eta: 0.0
    cfg_scale: 1.0
    viz:
      sampler_a: ddpm
      sampler_b: ddim

training:
  batch_size: 64
  num_workers: 4
  max_epochs: 200
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  # LR: CosineAnnealingWarmRestarts (cosine_restarts)
  # · 1주기 — 길이 T_0(에폭): lr이 초기 lr에서 eta_min까지 cosine으로 내려간 뒤, 주기 끝에서 다시 크게 올라감(restart).
  # · 2주기 — 길이 T_0 * T_mult: 같은 cosine 감쇠 패턴을 더 긴 구간으로 한 번 더 반복.
  #   이후 주기 길이는 매번 앞 주기 길이에 T_mult를 곱함 (T_mult=1이면 모든 주기가 T_0와 동일).
  schedule: cosine_restarts
  T_0: 10
  T_mult: 1
  eta_min: 1.0e-6
  early_stop_patience: 20

checkpoint:
  ckpt_dir: runs/dit_diffusion/
  ckpt_name: best.pt
