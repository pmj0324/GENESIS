data:
  data_fraction: 1.0
  data_dir: /home/work/cosmology/GENESIS/GENESIS-data/affine_default

model:
  architecture: unet
  in_channels: 3
  cond_dim: 6
  dropout: 0.1
  unet:
    preset: B
    attention_resolution: 32
    channel_se: true
    circular_conv: false
    cross_attn_cond: true
    per_scale_cond:  true
    cond_depth:      4

generative:
  framework: edm
  edm:
    # Preconditioning
    sigma_data: 0.5      # 정규화된 데이터의 std 추정값
    sigma_min:  0.002    # 샘플링 하한
    sigma_max:  80.0     # 샘플링 상한

    # Training: σ ~ LogNormal(P_mean, P_std²)
    P_mean:  -1.2        # Karras et al. Table 1 권장값
    P_std:    1.2

    # CFG
    cfg_prob: 0.2

    # Sampling
    steps:   40          # Heun은 40스텝이면 DDIM 1000스텝 수준
    eta:     0.0         # 0=deterministic ODE
    S_churn: 0.0         # stochastic churn (0=off)

  sampler:
    cfg_scale: 1.0
    viz:
      sampler_a: heun
      sampler_b: euler

training:
  batch_size: 8
  num_workers: 4
  max_epochs: 300
  lr: 2.0e-4            # EDM 논문 권장: Adam lr=1e-3 ~ 2e-4
  weight_decay: 0.0     # EDM에서는 weight decay 미사용
  betas: [0.9, 0.999]
  warmup_epochs: 5
  grad_clip: 1.0
  optimizer: adamw
  schedule: plateau
  plateau_patience: 5
  plateau_factor: 0.5
  early_stop_patience: 30

checkpoint:
  ckpt_dir: runs/unet_edm/
  ckpt_name: best.pt
