# 기본 affine를 유지하되 Mcdm만 약하게 squeeze한 설정
# log10(x) → (x - center) / (scale * scale_mult)
#
# 사용법:
#   python -m dataloader.build_dataset splits \
#       --maps-path   /home/work/cosmology/CAMELS/IllustrisTNG/Maps_3ch_IllustrisTNG_LH_z=0.00.npy \
#       --params-path /home/work/cosmology/CAMELS/IllustrisTNG/params_LH_IllustrisTNG.txt \
#       --out-dir     GENESIS-data/affine_squeezed_v1/ \
#       --norm-config configs/normalization/affine_squeezed_v1.yaml

normalization:
  Mcdm:
    method: affine
    center: 10.876
    scale: 0.590
    scale_mult: 1.12
  Mgas:
    method: affine
    center: 10.344
    scale: 0.627
  T:
    method: affine
    center: 4.2234
    scale: 0.8163
