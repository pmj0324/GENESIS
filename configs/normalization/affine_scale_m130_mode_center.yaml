# Affine with scale_mult=1.30, centered by empirical mode of log10(x).
# z = (log10(x) - center_mode) / (scale * scale_mult)
#
# NOTE:
# - method is still "affine".
# - center values below were measured from first 500 LH maps.

normalization:
  Mcdm:
    method: affine
    center: 10.7862
    scale: 0.590
    scale_mult: 1.30
  Mgas:
    method: affine
    center: 10.2622
    scale: 0.627
    scale_mult: 1.30
  T:
    method: affine
    center: 3.3856
    scale: 0.8163
    scale_mult: 1.30
