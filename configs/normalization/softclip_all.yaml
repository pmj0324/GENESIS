# All-softclip normalization
# 모든 채널에 같은 형태의 nonlinear compression 적용
#
# 변환:
#   z_affine = (log10(x) - center) / scale
#   z = clip_c * tanh(z_affine / clip_c)
#
# 사용법:
#   python -m dataloader.build_dataset splits \
#       --maps-path   /home/work/cosmology/CAMELS/IllustrisTNG/Maps_3ch_IllustrisTNG_LH_z=0.00.npy \
#       --params-path /home/work/cosmology/CAMELS/IllustrisTNG/params_LH_IllustrisTNG.txt \
#       --out-dir     GENESIS-data/softclip_all/ \
#       --norm-config configs/normalization/softclip_all.yaml

normalization:
  Mcdm:
    method: softclip
    center: 10.876
    scale: 0.590
    clip_c: 4.5
  Mgas:
    method: softclip
    center: 10.344
    scale: 0.627
    clip_c: 4.5
  T:
    method: softclip
    center: 4.2234
    scale: 0.8163
    clip_c: 4.5
