# Min-Max 정규화: 0~1 범위로 정규화
# 변환: z = (z_affine - min_z) / (max_z - min_z)
# 
# 사용법:
#   python -m dataloader.build_dataset splits \
#       --maps-path   /home/work/cosmology/CAMELS/IllustrisTNG/Maps_3ch_IllustrisTNG_LH_z=0.00.npy \
#       --params-path /home/work/cosmology/CAMELS/IllustrisTNG/params_LH_IllustrisTNG.txt \
#       --out-dir     GENESIS-data/minmax_0to1/ \
#       --norm-config configs/normalization/minmax_0to1.yaml

normalization:
  Mcdm:
    method: minmax
    center: 10.876
    scale: 0.590
    min_z: -2.149
    max_z: 7.331
    stats:              # 참고용 (affine 후 범위)
      min: -2.149
      max: 7.331
      p1: -1.261
      p99: 2.977
  Mgas:
    method: minmax
    center: 10.344
    scale: 0.627
    min_z: -2.214
    max_z: 6.244
    stats:
      min: -2.214
      max: 6.244
      p1: -1.338
      p99: 2.408
  T:
    method: minmax
    center: 4.2234
    scale: 0.8163
    min_z: -1.262
    max_z: 4.176
    stats:
      min: -1.262
      max: 4.176
      p1: -1.106
      p99: 2.481
