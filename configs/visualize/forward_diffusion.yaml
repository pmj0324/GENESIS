# ─────────────────────────────────────────────────────────────────────────────
# Forward Diffusion Animation Config
# 실제 데이터(x0)가 Gaussian noise로 변해가는 과정
#
# mode:
#   image     — 단일 샘플 이미지 애니메이션
#   histogram — 전체 데이터 분포 변화 히스토그램 애니메이션
#
# space:
#   physical  — denormalize해서 log10(물리량) 공간으로 표시
#   normalized — 정규화된 z 공간 그대로 표시
#
# 사용법:
#   python scripts/animate_forward.py --config configs/visualize/forward_diffusion.yaml
#   python scripts/animate_forward.py --config configs/visualize/forward_diffusion.yaml \
#       --mode histogram --space normalized
# ─────────────────────────────────────────────────────────────────────────────

data:
  data_dir:   GENESIS-data/affine_default
  split:      val
  sample_idx: 0          # image 모드 전용

schedule:
  name:      cosine
  timesteps: 1000

animation:
  mode:      image        # image / histogram
  space:     physical     # physical / normalized
  frames:    60
  fps:       15
  n_samples: 300          # histogram 모드 전용: 사용할 샘플 수
  n_bins:    80           # histogram 모드 전용: 빈 수
  cmap:
    Mcdm: viridis
    Mgas: magma
    T:    inferno

output:
  out_dir:   outputs/animations
  filename:  forward_diffusion    # 실제 파일명: {filename}_{mode}_{space}.gif
  dpi:       120
