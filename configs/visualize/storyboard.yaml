# ─────────────────────────────────────────────────────────────────────────────
# Storyboard Config
# 스케줄러별 forward diffusion 과정을 격자로 시각화 (정적 이미지)
# 행 = 스케줄러, 열 = 시간축 (균등 샘플)
# 채널별로 별도 저장
#
# 사용법:
#   python scripts/plot_storyboard.py --config configs/visualize/storyboard.yaml
# ─────────────────────────────────────────────────────────────────────────────

data:
  data_dir:   GENESIS-data/affine_default
  split:      val
  sample_idx: 0
  seed:       42    # 각 스케줄러마다 같은 noise 사용

schedules:
  - name: linear
    timesteps: 1000
  - name: cosine
    timesteps: 1000
  - name: sigmoid
    timesteps: 1000
  - name: edm
    timesteps: 1000

storyboard:
  n_cols:  13       # 열 수 (t=0 포함)
  space:   physical # physical / normalized
  cmap:
    Mcdm: viridis
    Mgas: magma
    T:    inferno

output:
  out_dir:  outputs/storyboard
  dpi:      150
